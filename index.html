<head>

<title>🇮🇳 Indian States Top Trumps</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#242424;
    --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18);
    --text:#e8e6e0; --text2:#9a9890; --text3:#5a5856;
    --blue:#185FA5; --blue-d:#0C3E75;
    --green:#0F6E56; --green-d:#2D6A0A;
    --red:#993C1D; --red-d:#7A1212;
    --amber:#854F0B; --gold:#B8860B;
    --r:12px; --rs:8px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  body { background:var(--bg); color:var(--text); min-height:100vh; }
  .app { max-width:580px; margin:0 auto; padding:1rem; }

  /* Buttons */
  button { padding:10px 20px; border-radius:var(--rs); border:0.5px solid var(--border2); background:var(--bg3); color:var(--text); font-size:14px; cursor:pointer; transition:background 0.12s,transform 0.1s; font-family:inherit; }
  button:hover { background:#2e2e2e; }
  button:active { transform:scale(0.98); }
  button.primary { background:var(--blue); border-color:var(--blue); color:#E6F1FB; width:100%; font-weight:500; }
  button.primary:hover { background:#1a6fbf; }
  button.small { padding:4px 10px; font-size:11px; }
  button.flip-on { background:rgba(239,159,39,0.2); border-color:#EF9F27; color:#EF9F27; }

  /* Inputs */
  input { width:100%; padding:10px; border-radius:var(--rs); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); font-size:14px; font-family:inherit; }
  input:focus { outline:none; border-color:var(--blue); }
  .code-input { font-size:28px; text-align:center; letter-spacing:0.2em; font-family:monospace; margin-bottom:0.75rem; }

  /* Cards */
  .card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); overflow:hidden; }
  .card-header { padding:0.75rem 1rem 0.5rem; }
  .card-header.you  { background:var(--blue); }
  .card-header.them { background:var(--red); }
  .card-header.cpu  { background:var(--red); }
  .card-header.p2   { background:var(--green); }
  .card-title { font-size:15px; font-weight:500; color:#E6F1FB; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-fact  { font-size:10px; color:rgba(230,241,251,0.65); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-style:italic; }

  /* Stat rows */
  .stat-row { display:flex; align-items:center; justify-content:space-between; height:36px; padding:0 1rem; border-bottom:0.5px solid var(--border); cursor:pointer; transition:background 0.12s; }
  .stat-row:last-child { border-bottom:none; }
  .stat-row:hover:not(.no-click) { background:var(--bg3); }
  .stat-row.no-click { cursor:default; }
  .stat-row.pro-stat { border-left:2px solid var(--gold); }
  .stat-name  { font-size:12px; color:var(--text2); }
  .stat-value { font-size:13px; font-weight:500; color:var(--text); }
  .pro-badge  { font-size:9px; background:rgba(184,134,11,0.2); color:var(--gold); border-radius:4px; padding:1px 4px; margin-left:4px; vertical-align:middle; }
  .stat-row.winner  { background:#2D6A0A; outline:2px solid #5A9E22; outline-offset:-2px; }
  .stat-row.winner .stat-name,.stat-row.winner .stat-value { color:#E8F5D8 !important; }
  .stat-row.loser   { background:#7A1212; outline:2px solid #C0392B; outline-offset:-2px; }
  .stat-row.loser  .stat-name,.stat-row.loser  .stat-value { color:#FAE0E0 !important; }
  .stat-row.selected { background:#0C3E75; outline:2px solid #185FA5; outline-offset:-2px; }
  .stat-row.selected .stat-name,.stat-row.selected .stat-value { color:#C8DFF5 !important; }
  .stat-row.cpu-pick { background:#0C3E75; outline:2px solid #185FA5; outline-offset:-2px; }
  .stat-row.cpu-pick .stat-name,.stat-row.cpu-pick .stat-value { color:#C8DFF5 !important; }

  /* Face-down */
  .facedown-body { display:flex; flex-direction:column; }
  .facedown-row  { height:36px; border-bottom:0.5px solid var(--border); background:repeating-linear-gradient(135deg,#1a0e06 0,#1a0e06 6px,#251508 6px,#251508 12px); }
  .facedown-row:last-child { border-bottom:none; }

  /* Arena */
  .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0.75rem 0; }

  /* Card flip animation */
  @keyframes cardFlipIn {
    0%   { transform:rotateY(-90deg) scale(0.95); opacity:0; }
    60%  { transform:rotateY(8deg) scale(1.02); opacity:1; }
    100% { transform:rotateY(0deg) scale(1); opacity:1; }
  }
  .card-flip { animation:cardFlipIn 0.35s ease-out forwards; transform-origin:left center; }

  /* Score bar */
  .score-bar { display:flex; justify-content:space-between; align-items:center; padding:0.65rem 1rem; background:var(--bg2); border-radius:var(--rs); margin-bottom:0.75rem; border:0.5px solid var(--border); }
  .score-label { font-size:12px; color:var(--text2); }
  .score-num   { font-size:18px; font-weight:500; }

  /* Messages */
  .msg      { text-align:center; font-size:13px; color:var(--text2); min-height:20px; margin:0.4rem 0; }
  .msg.win  { color:#5A9E22; font-weight:500; }
  .msg.lose { color:#E24B4A; font-weight:500; }
  .msg.draw { color:#EF9F27; font-weight:500; }
  .msg.wait { color:var(--blue); font-weight:500; }

  /* Badges */
  .turn-badge  { font-size:11px; padding:3px 12px; border-radius:20px; display:inline-block; }
  .turn-you    { background:rgba(24,95,165,0.2); color:#85B7EB; border:0.5px solid rgba(24,95,165,0.4); }
  .turn-them   { background:rgba(153,60,29,0.2); color:#F0997B; border:0.5px solid rgba(153,60,29,0.4); }
  .turn-p2     { background:rgba(15,110,86,0.2); color:#5DCAA5; border:0.5px solid rgba(15,110,86,0.4); }
  .turn-wrap   { text-align:center; margin-bottom:0.5rem; }

  /* Toolbar + pills */
  .toolbar   { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:0.75rem; }
  .pill      { font-size:11px; padding:3px 10px; border-radius:20px; cursor:pointer; border:0.5px solid var(--border2); background:var(--bg3); color:var(--text2); user-select:none; transition:all 0.1s; white-space:nowrap; }
  .pill:hover { border-color:var(--border2); background:#2e2e2e; }
  .pill.active-cpu     { background:rgba(153,60,29,0.2); color:#F0997B; border-color:rgba(153,60,29,0.5); }
  .pill.active-hotseat { background:rgba(15,110,86,0.2); color:#5DCAA5; border-color:rgba(15,110,86,0.5); }
  .pill.active-online  { background:rgba(24,95,165,0.2); color:#85B7EB; border-color:rgba(24,95,165,0.5); }
  .pill.active-easy    { background:rgba(90,158,34,0.2); color:#97C459; border-color:rgba(90,158,34,0.5); }
  .pill.active-medium  { background:rgba(239,159,39,0.2); color:#EF9F27; border-color:rgba(239,159,39,0.5); }
  .pill.active-hard    { background:rgba(226,75,74,0.2); color:#F09595; border-color:rgba(226,75,74,0.5); }
  .pill.active-ut      { background:rgba(212,83,126,0.2); color:#ED93B1; border-color:rgba(212,83,126,0.5); }
  .pill.active-pro     { background:rgba(184,134,11,0.2); color:var(--gold); border-color:rgba(184,134,11,0.5); }

  /* Controls */
  .controls { display:flex; gap:8px; justify-content:center; margin:0.75rem 0; flex-wrap:wrap; align-items:center; }

  /* Lobby */
  .lobby { padding:1.5rem 0; }
  .lobby-section { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); padding:1.25rem; margin-bottom:1rem; }
  .lobby-section h3 { font-size:11px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.75rem; }
  .code-display { font-size:44px; font-weight:600; letter-spacing:0.2em; text-align:center; font-family:monospace; margin:0.5rem 0; }
  .waiting { font-size:13px; color:var(--text2); text-align:center; margin-top:0.75rem; }
  .pulse { display:inline-block; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .err { color:#E24B4A; font-size:12px; text-align:center; margin-top:6px; min-height:18px; }

  /* Misc */
  .room-strip  { font-size:11px; color:var(--text3); text-align:center; margin-bottom:6px; }
  .memory-bar  { font-size:10px; color:var(--text3); text-align:center; margin-top:4px; min-height:14px; }
  .streak      { font-size:11px; color:#EF9F27; text-align:center; min-height:16px; margin-bottom:4px; }
  .flip-banner { text-align:center; font-size:12px; color:#EF9F27; margin-top:4px; }
  .history-wrap  { margin-top:1rem; }
  .history-title { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
  .history-row   { display:flex; justify-content:space-between; align-items:center; font-size:11px; padding:5px 0; border-bottom:0.5px solid var(--border); color:var(--text2); }
  .history-row:last-child { border-bottom:none; }
  .h-win  { color:#5A9E22; }
  .h-lose { color:#E24B4A; }
  .h-draw { color:#EF9F27; }
  .gameover { text-align:center; padding:3rem 1rem; }
  .gameover-emoji { font-size:56px; margin-bottom:1rem; }
  .gameover-title { font-size:22px; font-weight:500; margin-bottom:1.5rem; }
  .dot    { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }
  .dot-ok { background:#5A9E22; }
  .dot-err{ background:#E24B4A; }
  .confetti-piece { position:fixed; width:10px; height:10px; top:-10px; animation:confetti-fall linear forwards; border-radius:2px; pointer-events:none; z-index:9999; }
  @keyframes confetti-fall { to { transform:translateY(105vh) rotate(720deg); opacity:0; } }
  .handoff { text-align:center; padding:2.5rem 1rem; background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); }
  .end-banner { text-align:center; padding:1rem; border-radius:var(--r); margin-top:0.5rem; }

  .end-banner.lost { background:rgba(122,18,18,0.2); border:1px solid #C0392B; }

function fmt(k,v){
  if(v===undefined||v===null) return "—";
  if(k==="population") return v.toFixed(2)+"M";
  if(k==="area")       return v.toLocaleString();
  if(k==="gdp")        return "$"+v+"B";
  if(k==="literacy"||k==="forest"||k==="internet") return v.toFixed(1)+"%";
  if(k==="hdi")        return v.toFixed(3);
  if(k==="border")     return v===0?"None":v.toLocaleString()+" km";
  return v;
}

// ════════════════════════════════════════════════════════════
// FLIP LOGIC
// 1 flip = lowest wins. 2 flips = cancel = highest wins.
// ════════════════════════════════════════════════════════════
function isFlipActive(p1f, p2f){ return p1f !== p2f; } // XOR

function getOutcome(pv, cv, pickerTurn, p1f, p2f){
  const flipped = isFlipActive(p1f||false, p2f||false);
  // flipped = lowest wins; else highest wins
  if(pickerTurn==="p1"){
    if(flipped) return pv<cv?"win":pv>cv?"lose":"draw";
    return pv>cv?"win":pv<cv?"lose":"draw";
  } else {
    if(flipped) return cv<pv?"lose":cv>pv?"win":"draw";
    return cv>pv?"lose":cv<pv?"win":"draw";
  }
}

function flipBannerText(p1f, p2f){
  if(!p1f&&!p2f) return "";
  if(p1f&&p2f) return "🔄🔄 Both flipped — cancelled out! Highest wins.";
  return "🔄 Flip active — lowest stat wins this round!";
}

  for(let i=0;i<70;i++){
    const p=document.createElement("div");
    p.className="confetti-piece";
    p.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?"50%":"2px"}`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3500);
  }
}

// Build a single card HTML

function buildCard(card, opts){
  const {hdrCls, activeStat, outcome, clickable, animate} = opts;
  const STATS = getActiveStats();
  const rows = STATS.map(s=>{
    let cls="stat-row";
    if(s.key==="hdi"||s.key==="airports"||s.key==="districts"||s.key==="internet") cls+=" pro-stat";
    if(activeStat&&s.key===activeStat){
      cls+=outcome==="win"?" winner":outcome==="lose"?" loser":outcome==="draw"?" selected":" selected";
    }
    const proLabel = (s.key==="hdi"||s.key==="airports"||s.key==="districts"||s.key==="internet") ? `<span class="pro-badge">PRO</span>` : "";
    return `<div class="${cls}"${clickable?` onclick="pickStat('${s.key}')"`:""}><span class="stat-name">${s.label}${proLabel}</span><span class="stat-value">${fmt(s.key,card[s.key])}</span></div>`;
  }).join("");
  const utBadge = card.isUT ? `<span style="font-size:9px;background:rgba(212,83,126,0.3);color:#ED93B1;border-radius:4px;padding:1px 5px;margin-left:6px">UT</span>` : "";
  return `<div class="card${animate?" card-flip":""}">
    <div class="card-header ${hdrCls}">
      <p class="card-title">${card.emoji} ${card.name}${utBadge}</p>
      <p class="card-fact">${card.fact}</p>
    </div>
    ${rows}
  </div>`;
}

function startCPU(){
  sfxClick(); mode="cpu";
  const s=shuffle(getActiveDeck());
  const half=Math.floor(s.length/2);
  p1Deck=s.slice(0,half); p2Deck=s.slice(half);
  phase="pick"; turn="p1"; selectedStat=null;
  roundHistory=[]; streak=0; cpuSeenCards=new Set();
  p1FlipsLeft=2; p2FlipsLeft=2; p1FlippedThisRound=false; p2FlippedThisRound=false;
  renderCPU(true);
}

function cpuPickStat(card){
  if(difficulty==="easy") return getActiveStats()[Math.floor(Math.random()*getActiveStats().length)].key;
  if(difficulty==="medium"){
    let best=null,bs=-1;
    getActiveStats().forEach(s=>{const[mn,mx]=RANGES[s.key];const sc=(card[s.key]-mn)/(mx-mn);if(sc>bs){bs=sc;best=s.key;}});
    return best;
  }
  // Hard: card counting
  const cpuNames=new Set(p2Deck.map(c=>c.name));
  const possible=getActiveDeck().filter(s=>!cpuNames.has(s.name)&&!cpuSeenCards.has(s.name));
  if(!possible.length){
    let best=null,bs=-1;
    getActiveStats().forEach(s=>{const[mn,mx]=RANGES[s.key];const sc=(card[s.key]-mn)/(mx-mn);if(sc>bs){bs=sc;best=s.key;}});
    return best;
  }
  let bestStat=null,bestW=-1,bestM=-Infinity;
  getActiveStats().forEach(s=>{
    let w=0,tot=0;
    possible.forEach(pc=>{const m=card[s.key]-pc[s.key];if(m>0)w++;tot+=m;});
    const avg=tot/possible.length;
    if(w>bestW||(w===bestW&&avg>bestM)){bestW=w;bestM=avg;bestStat=s.key;}
  });
  return bestStat;
}

function renderCPU(animate){
  p1Card=p1Deck[0]; p2Card=p2Deck[0];
  if(!p1Deck.length||!p2Deck.length){
    const won=p1Deck.length>p2Deck.length;
    won?sfxFanfare():sfxBoom();
    if(won){sessionWins++;confetti();}else sessionLosses++;
    render(`<div class="gameover">
      <div class="gameover-emoji">${won?"🎉":"😔"}</div>
      <div class="gameover-title">${won?"You won!":"CPU wins!"}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:1.5rem">Session: ${sessionWins}W ${sessionLosses}L ${sessionDraws}D</div>
      <button class="primary" onclick="startCPU()">Play again</button>
      <button onclick="showMenu()" style="margin-top:8px;width:100%">Main menu</button>
    </div>`);return;
  }
  const isCPUTurn=turn==="cpu", inR=phase==="result";
  const outcome = inR ? getOutcome(p1Card[selectedStat],p2Card[selectedStat],turn,p1FlippedThisRound,p2FlippedThisRound) : null;
  let mt="",mc="msg",bt="",bc="turn-badge";
  if(!inR){
    if(!isCPUTurn){mt="Pick a stat!";bt="Your turn";bc="turn-badge turn-you";}
    else{mt=`CPU picks: ${getActiveStats().find(s=>s.key===selectedStat)?.label||"…"}`;mc="msg wait";bt="CPU's turn";bc="turn-badge turn-them";}
  } else {
    if(outcome==="win"){mt="You win this round! 🎉";mc="msg win";}
    else if(outcome==="lose"){mt="CPU wins this round! 😔";mc="msg lose";}
    else{mt="It's a draw!";mc="msg draw";}
    bt=turn==="p1"?"Your pick":"CPU's pick"; bc="turn-badge "+(turn==="p1"?"turn-you":"turn-them");
  }
  const streakBar=streak>=2?`<div class="streak">🔥 ${streak} round streak!</div>`:`<div class="streak"></div>`;
  const memBar=difficulty==="hard"?`<div class="memory-bar">🧮 CPU memory: ${cpuSeenCards.size} seen</div>`:"";
  const flipBanner=inR?`<div class="flip-banner">${flipBannerText(p1FlippedThisRound,p2FlippedThisRound)}</div>`:"";

  // Flip button
  const flipBtn=!inR?`<button class="${p1FlippedThisRound?"flip-on":""}" onclick="cpuToggleFlip()">
    🔄 Flip ${p1FlippedThisRound?"ON ✓":"OFF"} (${p1FlipsLeft} left)
  </button>`:"";

  el("app").innerHTML=`
    <div class="toolbar">
      <span class="pill active-cpu">vs CPU</span>
      <span class="pill ${difficulty==="easy"?"active-easy":""}" onclick="setDiff('easy')">Easy</span>
      <span class="pill ${difficulty==="medium"?"active-medium":""}" onclick="setDiff('medium')">Medium</span>
      <span class="pill ${difficulty==="hard"?"active-hard":""}" onclick="setDiff('hard')">Hard</span>
      <span class="pill ${includeUTs?"active-ut":""}" onclick="toggleUTs()">🏛️ UTs</span>
      <span class="pill ${proMode?"active-pro":""}" onclick="toggleProInGame()">⚡ Pro</span>
      <span style="flex:1"></span>
      <button class="small" onclick="showMenu()">Menu</button>
    </div>
    <div class="score-bar">
      <div><div class="score-label">Your cards</div><div class="score-num">${p1Deck.length}</div></div>
      <div style="font-size:11px;color:var(--text3)">${p1Deck.length+p2Deck.length} in play</div>
      <div style="text-align:right"><div class="score-label">CPU cards</div><div class="score-num">${p2Deck.length}</div></div>
    </div>
    ${streakBar}
    <div class="turn-wrap"><span class="${bc}">${bt}</span></div>
    <div class="${mc}">${mt}</div>
    <div class="arena">
      ${buildCard(p1Card,{hdrCls:"you",activeStat:selectedStat,outcome,clickable:!inR&&!isCPUTurn,animate})}
      ${inR
        ? buildCard(p2Card,{hdrCls:"cpu",activeStat:selectedStat,outcome:outcome==="win"?"lose":outcome==="lose"?"win":outcome,clickable:false,animate})
        : faceDown("cpu", difficulty==="easy"?"🎲 Random":difficulty==="medium"?"🧠 Smart":"🧮 Counting")}
    </div>
    <div class="controls">
      ${inR?`<button onclick="cpuNext()">Next card ↗</button>`:""}
      ${!inR&&isCPUTurn?`<button onclick="revealCPU()">Reveal CPU card ↗</button>`:""}
      ${!inR?flipBtn:""}
    </div>
    ${flipBanner}
    ${memBar}
    ${historyHTML()}`;
}

function toggleProInGame(){ sfxClick(); proMode=!proMode; if(mode==="cpu")renderCPU(false); }

function setDiff(d){ sfxClick(); difficulty=d; startCPU(); }

function cpuToggleFlip(){
  sfxClick();
  if(p1FlipsLeft<=0&&!p1FlippedThisRound)return;
  p1FlippedThisRound=!p1FlippedThisRound;
  if(p1FlippedThisRound) p1FlipsLeft--; else p1FlipsLeft++;
  renderCPU(false);
}

function pickStat(key){
  sfxClick(); selectedStat=key; phase="result";
  const outcome=getOutcome(p1Card[key],p2Card[key],"p1",p1FlippedThisRound,p2FlippedThisRound);
  addHistory(key,p1Card[key],p2Card[key],outcome);
  if(outcome==="win"){sfxWin();streak++;}else if(outcome==="lose"){sfxLose();streak=0;}else sfxDraw();
  renderCPU(false);
}

function revealCPU(){
  sfxClick(); phase="result";
  const outcome=getOutcome(p1Card[selectedStat],p2Card[selectedStat],"cpu",p1FlippedThisRound,p2FlippedThisRound);
  addHistory(selectedStat,p1Card[selectedStat],p2Card[selectedStat],outcome);
  if(outcome==="win"){sfxWin();streak++;}else if(outcome==="lose"){sfxLose();streak=0;}else sfxDraw();
  renderCPU(false);
}

function cpuNext(){
  sfxClick();
  const outcome=getOutcome(p1Card[selectedStat],p2Card[selectedStat],turn,p1FlippedThisRound,p2FlippedThisRound);
  cpuSeenCards.add(p1Card.name);
  if(outcome==="win"){p1Deck.push(p1Deck.shift());p1Deck.push(p2Deck.shift());turn="p1";}
  else if(outcome==="lose"){p2Deck.push(p2Deck.shift());p2Deck.push(p1Deck.shift());turn="cpu";}
  else{p1Deck.push(p1Deck.shift());p2Deck.push(p2Deck.shift());}
  if(turn==="cpu"){selectedStat=cpuPickStat(p2Deck[0]);}else{selectedStat=null;}
  phase="pick"; p1FlippedThisRound=false; p2FlippedThisRound=false;
  renderCPU(true);
}

function addHistory(stat,pv,cv,outcome){
  const s=getActiveStats().find(x=>x.key===stat);
  roundHistory.unshift({label:s?.label||stat,pv:fmt(stat,pv),cv:fmt(stat,cv),outcome});
  if(roundHistory.length>5)roundHistory.pop();
}

function historyHTML(){
  if(!roundHistory.length)return"";
  return`<div class="history-wrap">
    <div class="history-title">Last rounds</div>
    ${roundHistory.map(r=>`<div class="history-row">
      <span>${r.label}</span>
      <span>You ${r.pv} · CPU ${r.cv}</span>
      <span class="h-${r.outcome}">${r.outcome==="win"?"✓ Win":r.outcome==="lose"?"✗ Lose":"= Draw"}</span>
    </div>`).join("")}
  </div>`;
}

    else if(outcome==="lose"){mt=`${turn==="p1"?"Player 2":"Player 1"} wins! 🎉`;mc="msg win";}
    else{mt="It's a draw!";mc="msg draw";}
    bt=`${pLabel}'s pick`;bc="turn-badge "+(turn==="p1"?"turn-you":"turn-p2");
  }
  const flipBanner=inR?`<div class="flip-banner">${flipBannerText(p1FlippedThisRound,p2FlippedThisRound)}</div>`:"";
  const flipBtn=!inR?`<button class="${myFlip?"flip-on":""}" onclick="hotseatToggleFlip()">
    🔄 Flip ${myFlip?"ON ✓":"OFF"} (${myFlipsLeft} left)
  </button>`:"";
  el("app").innerHTML=`
    <div class="toolbar">
      <span class="pill active-hotseat">👥 Hotseat</span>
      <span class="pill ${includeUTs?"active-ut":""}" onclick="toggleUTs()">🏛️ UTs</span>
      <span class="pill ${proMode?"active-pro":""}" onclick="toggleProInGame()">⚡ Pro</span>
      <span style="flex:1"></span>
      <button class="small" onclick="showMenu()">Menu</button>
    </div>
    <div class="score-bar">
      <div><div class="score-label">P1 cards</div><div class="score-num">${p1Deck.length}</div></div>
      <div style="font-size:11px;color:var(--text3)">${p1Deck.length+p2Deck.length} in play</div>
      <div style="text-align:right"><div class="score-label">P2 cards</div><div class="score-num">${p2Deck.length}</div></div>
    </div>
    <div class="turn-wrap"><span class="${bc}">${bt}</span></div>
    <div class="${mc}">${mt}</div>
    <div class="arena">
      ${inR
        ? buildCard(activeCard,{hdrCls:activeHdr,activeStat:selectedStat,outcome,clickable:false,animate})
          +buildCard(oppCard,{hdrCls:oppHdr,activeStat:selectedStat,outcome:outcome==="win"?"lose":outcome==="lose"?"win":outcome,clickable:false,animate})
        : buildCard(activeCard,{hdrCls:activeHdr,activeStat:null,outcome:null,clickable:true,animate})
          +faceDown(oppHdr,"Hidden")}
    </div>
    <div class="controls">
      ${inR?`<button onclick="hotseatNext('${outcome}')">Next card ↗</button>`:""}
      ${!inR?flipBtn:""}
    </div>
    ${flipBanner}`;
}

function hotseatToggleFlip(){
  sfxClick();
  if(turn==="p1"){if(p1FlipsLeft<=0&&!p1FlippedThisRound)return;p1FlippedThisRound=!p1FlippedThisRound;if(p1FlippedThisRound)p1FlipsLeft--;else p1FlipsLeft++;}
  else{if(p2FlipsLeft<=0&&!p2FlippedThisRound)return;p2FlippedThisRound=!p2FlippedThisRound;if(p2FlippedThisRound)p2FlipsLeft--;else p2FlipsLeft++;}
  renderHotseat(false);
}

function hotseatNext(outcome){
  sfxClick();
  const p1won=(turn==="p1"&&outcome==="win")||(turn==="p2"&&outcome==="lose");
  const p2won=(turn==="p2"&&outcome==="win")||(turn==="p1"&&outcome==="lose");
  if(p1won){p1Deck.push(p1Deck.shift());p1Deck.push(p2Deck.shift());turn="p1";}
  else if(p2won){p2Deck.push(p2Deck.shift());p2Deck.push(p1Deck.shift());turn="p2";}
  else{p1Deck.push(p1Deck.shift());p2Deck.push(p2Deck.shift());}
  phase="pick"; selectedStat=null; p1FlippedThisRound=false; p2FlippedThisRound=false;
  if(outcome!=="draw"){handoffTo=turn==="p1"?"P1":"P2";phase="handoff";}
  renderHotseat(false);
}

function revealForPlayer(){sfxClick();phase="pick";renderHotseat(true);}


// ════════════════════════════════════════════════════════════
// ONLINE MODE — Firebase REST
// ════════════════════════════════════════════════════════════
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
function startPoll(){
  stopPoll();
  pollTimer=setInterval(async()=>{
    try{const st=normState(await fbGet(`rooms/${roomCode}`));if(!st)return;if(st.version!==lastVer){lastVer=st.version;if(st.proMode!==undefined)proMode=st.proMode;if(st.includeUTs!==undefined)includeUTs=st.includeUTs;if(st.flipsAllowed!==undefined)onlineFlipsAllowed=st.flipsAllowed;renderOnline(st);}}catch(e){}
  },1500);
}

let _fbOk = false; // cached Firebase connection status

async function showOnlineLobby(){
  sfxClick(); mode="online";
  // Ping Firebase once, then render
  try{await fbGet("ping");_fbOk=true;}catch(e){_fbOk=false;}
  renderOnlineLobby();
}

// Renders the lobby UI — called on load and whenever settings change
// Does NOT re-ping Firebase, just uses cached _fbOk status
function renderOnlineLobby(){
  const flipDesc = onlineFlipsAllowed===0?"No flips — pure stat battle"
    :onlineFlipsAllowed===1?"One flip — use it wisely!"
    :onlineFlipsAllowed===2?"Two flips — classic mode"
    :onlineFlipsAllowed+" flips — chaotic mode!";
  render(`<div class="lobby">
    <p style="font-size:11px;color:var(--text3);margin-bottom:1rem">
      <span class="dot ${_fbOk?"dot-ok":"dot-err"}"></span>
      ${_fbOk?"Firebase connected ✓":"Firebase unreachable"}
    </p>
    <h2 style="font-size:20px;font-weight:500;margin-bottom:0.25rem">Online Multiplayer</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1.5rem">Two devices, one game</p>
    <div class="lobby-section">
      <h3>Create a room</h3>
      <div style="margin-bottom:0.75rem">
        <p style="font-size:12px;color:var(--text2);margin-bottom:0.5rem">🔄 Flips allowed per player</p>
        <div style="display:flex;gap:6px">
          ${[0,1,2,3,4,5].map(n=>`<span class="pill ${onlineFlipsAllowed===n?"active-pro":""}"
            style="flex:1;text-align:center" onclick="setOnlineFlips(${n})">${n}</span>`).join("")}
        </div>
        <p style="font-size:11px;color:var(--text3);margin-top:6px">${flipDesc}</p>
      </div>
      <div style="margin-bottom:0.75rem">
        <p style="font-size:12px;color:var(--text2);margin-bottom:0.5rem">Other settings</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <!-- These toggles call renderOnlineLobby() NOT showMenu() so we stay on this screen -->
          <span class="pill ${includeUTs?"active-ut":""}"
            onclick="includeUTs=!includeUTs;sfxClick();renderOnlineLobby()">
            🏛️ UTs ${includeUTs?"ON":"OFF"}
          </span>
          <span class="pill ${proMode?"active-pro":""}"
            onclick="proMode=!proMode;sfxClick();renderOnlineLobby()">
            ⚡ Pro Stats ${proMode?"ON":"OFF"}
          </span>
        </div>
      </div>
      <button class="primary" onclick="createOnlineRoom()">Create room ↗</button>
    </div>
    <div class="lobby-section">
      <h3>Join a room</h3>
      <input class="code-input" id="jc" maxlength="4" placeholder="ABCD"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"
        onkeydown="if(event.key==='Enter')joinOnlineRoom()"/>
      <button class="primary" onclick="joinOnlineRoom()">Join room ↗</button>
      <div class="err" id="je"></div>
    </div>
    <button onclick="showMenu()" style="width:100%;margin-top:0.5rem">Back</button>
  </div>`);
}

// Set how many flips each player gets — called from lobby selector
function setOnlineFlips(n){
  sfxClick();
  onlineFlipsAllowed=n;
  renderOnlineLobby(); // re-render WITHOUT re-pinging Firebase
}

async function createOnlineRoom(){
  sfxClick(); roomCode=makeCode(); myRole="p1";
  const s=shuffle(getActiveDeck());
  const half=Math.floor(s.length/2);
  const st={
    p1Deck:s.slice(0,half).map(c=>c.name),
    p2Deck:s.slice(half).map(c=>c.name),
    turn:"p1",phase:"waiting",
    selectedStat:null,pickedBy:null,result:null,
    p1Flips:onlineFlipsAllowed,p2Flips:onlineFlipsAllowed,
    p1Flipped:false,p2Flipped:false,
    isGameOver:false,version:0,
    proMode:proMode,
    includeUTs:includeUTs,
    flipsAllowed:onlineFlipsAllowed
  };
  try{
    await fbSet(`rooms/${roomCode}`,st);
    render(`<div class="lobby">
      <h2 style="font-size:20px;font-weight:500;margin-bottom:0.25rem">Room created!</h2>
      <p style="font-size:13px;color:var(--text2);margin-bottom:1.5rem">Share this code with your friend</p>
      <div class="lobby-section"><div class="code-display">${roomCode}</div>
      <p class="waiting"><span class="pulse">⏳</span> Waiting for Player 2…</p>
      <div style="margin-top:0.75rem;font-size:12px;color:var(--text3);text-align:center">
        🔄 ${onlineFlipsAllowed} flip${onlineFlipsAllowed!==1?"s":""} per player &nbsp;·&nbsp;
        ${includeUTs?"🏛️ UTs ON":"🏛️ UTs OFF"} &nbsp;·&nbsp;
        ${proMode?"⚡ Pro ON":"⚡ Pro OFF"}
      </div></div>
      <button onclick="cancelOnlineRoom()" style="width:100%;margin-top:0.5rem">Cancel</button>
    </div>`);
    lastVer=0; startPoll();
  }catch(e){alert("Error: "+e.message);}
}

async function cancelOnlineRoom(){sfxClick();stopPoll();try{await fbDel(`rooms/${roomCode}`);}catch(e){}showOnlineLobby();}

async function joinOnlineRoom(){
  sfxClick();
  const code=(el("jc")?.value||"").trim().toUpperCase();
  if(code.length!==4){el("je").textContent="Enter a 4-letter code";return;}
  try{
    const st=normState(await fbGet(`rooms/${code}`));
    if(!st){el("je").textContent="Room not found";return;}
    if(st.phase!=="waiting"){el("je").textContent="Game already started";return;}
    roomCode=code; myRole="p2";
    // Apply P1's settings so both players see same deck and stats
    if(st.proMode!==undefined) proMode=st.proMode;
    if(st.includeUTs!==undefined) includeUTs=st.includeUTs;
    if(st.flipsAllowed!==undefined) onlineFlipsAllowed=st.flipsAllowed;
    st.phase="pick"; st.version=(st.version||0)+1;
    await fbSet(`rooms/${roomCode}`,st);
    lastVer=st.version; startPoll(); renderOnline(st);
  }catch(e){el("je").textContent="Error: "+e.message;}
}

// Toggle flip in online mode — hidden from opponent until reveal
async function onlineToggleFlip(){
  sfxClick();
  try{
    const st=normState(await fbGet(`rooms/${roomCode}`));
    if(!st||st.phase!=="pick")return;
    const fKey=myRole==="p1"?"p1Flipped":"p2Flipped";
    const lKey=myRole==="p1"?"p1Flips":"p2Flips";
    const on=st[fKey]||false;
    if(!on&&(st[lKey]||0)<=0)return;
    st[fKey]=!on;
    if(!on) st[lKey]=(st[lKey]||0)-1; else st[lKey]=(st[lKey]||0)+1;
    st.version=(st.version||0)+1;
    await fbSet(`rooms/${roomCode}`,st);
    lastVer=st.version; renderOnline(st);
  }catch(e){console.error(e);}
}

// Firebase sometimes returns arrays as objects {0:"name",1:"name"}
// toArr safely converts either format back to a proper array
function toArr(val){ return Array.isArray(val)?val:Object.values(val||{}); }

// Normalise all array fields in a Firebase room state
function normState(st){
  if(!st) return st;
  st.p1Deck=toArr(st.p1Deck);
  st.p2Deck=toArr(st.p2Deck);
  return st;
}

async function onlinePickStat(key){
  sfxClick();
  try{
    const st=normState(await fbGet(`rooms/${roomCode}`));
    if(!st||st.phase!=="pick"||st.turn!==myRole)return;
    const myD=myRole==="p1"?st.p1Deck:st.p2Deck;
    const opD=myRole==="p1"?st.p2Deck:st.p1Deck;
    const mc=ALL_CARDS.find(s=>s.name===myD[0]);
    const oc=ALL_CARDS.find(s=>s.name===opD[0]);
    if(!mc||!oc){console.error("Card not found",myD[0],opD[0]);return;}
    const p1f=st.p1Flipped||false, p2f=st.p2Flipped||false;
    const flipActive=isFlipActive(p1f,p2f);
    const mv=mc[key], ov=oc[key];
    let result;
    if(myRole==="p1") result=flipActive?(mv<ov?"win":mv>ov?"lose":"draw"):(mv>ov?"win":mv<ov?"lose":"draw");
    else              result=flipActive?(ov<mv?"win":ov>mv?"lose":"draw"):(ov>mv?"win":ov<mv?"lose":"draw");
    // Check if this is the last card
    const p1WinsRound=result==="win";
    const isGameOver=(p1WinsRound&&st.p2Deck.length===1)||(!p1WinsRound&&result!=="draw"&&st.p1Deck.length===1);
    st.selectedStat=key; st.result=result; st.pickedBy=myRole;
    st.phase="result"; st.isGameOver=isGameOver;
    st.version=(st.version||0)+1;
    await fbSet(`rooms/${roomCode}`,st);
    lastVer=st.version; renderOnline(st);
  }catch(e){console.error("onlinePickStat error:",e);}
}

async function onlineNextCard(){
  sfxClick();
  try{
    const st=normState(await fbGet(`rooms/${roomCode}`));
    if(!st||st.phase!=="result")return;
    const p1w=st.result==="win", p2w=st.result==="lose";
    const winner=p1w?"p1":p2w?"p2":null;
    if(winner&&winner!==myRole&&st.result!=="draw")return; // only winner advances
    if(p1w){st.p1Deck.push(st.p1Deck.shift());st.p1Deck.push(st.p2Deck.shift());st.turn="p1";}
    else if(p2w){st.p2Deck.push(st.p2Deck.shift());st.p2Deck.push(st.p1Deck.shift());st.turn="p2";}
    else{st.p1Deck.push(st.p1Deck.shift());st.p2Deck.push(st.p2Deck.shift());}
    st.phase="pick"; st.selectedStat=null; st.result=null; st.pickedBy=null;
    st.p1Flipped=false; st.p2Flipped=false; st.isGameOver=false;
    st.version=(st.version||0)+1;
    await fbSet(`rooms/${roomCode}`,st);
    lastVer=st.version; renderOnline(st);
  }catch(e){console.error(e);}
}

async function leaveOnline(){
  sfxClick();
  // Write a flag to Firebase so the other player gets notified
  try{
    const st=await fbGet(`rooms/${roomCode}`);
    if(st){
      st.playerLeft=myRole; // "p1" or "p2" — whichever left
      st.version=(st.version||0)+1;
      await fbSet(`rooms/${roomCode}`,st);
    }
  }catch(e){}
  stopPoll();
  showMenu();
}

function renderOnline(state){
  state=normState(state); // ensure arrays are proper arrays
  const app=el("app");if(!app||!myRole)return;
  if(state.phase==="waiting"&&myRole==="p1")return;

  // ── Opponent left notification ──────────────────────────
  // If the OTHER player wrote a playerLeft flag, show notification
  if(state.playerLeft && state.playerLeft !== myRole){
    sfxLose(); stopPoll();
    app.innerHTML=`<div class="gameover">
      <div class="gameover-emoji">🚪</div>
      <div class="gameover-title">Opponent left the game</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:1.5rem">
        Your opponent disconnected. The game has ended.
      </p>
      <button class="primary" onclick="showOnlineLobby()">Play again</button>
      <button onclick="showMenu()" style="margin-top:8px;width:100%">Main menu</button>
    </div>`;return;
  }

  const myD=myRole==="p1"?state.p1Deck:state.p2Deck;
  const opD=myRole==="p1"?state.p2Deck:state.p1Deck;
  if(!myD?.length||!opD?.length){
    const iWon=myD?.length>0;
    iWon?sfxFanfare():sfxBoom();stopPoll();if(iWon)confetti();
    app.innerHTML=`<div class="gameover">
      <div class="gameover-emoji">${iWon?"🎉":"😔"}</div>
      <div class="gameover-title">${iWon?"You won!":"Opponent wins!"}</div>
      <button class="primary" onclick="showOnlineLobby()">Play again</button>
      <button onclick="showMenu()" style="margin-top:8px;width:100%">Main menu</button>
    </div>`;return;
  }
  const mc=ALL_CARDS.find(s=>s.name===myD[0]);
  const oc=ALL_CARDS.find(s=>s.name===opD[0]);
  const isMy=state.turn===myRole, inR=state.phase==="result", sel=state.selectedStat;
  // Derive my outcome
  let myOut=null;
  if(inR&&state.result){
    if(state.result==="draw") myOut="draw";
    else if(myRole==="p1") myOut=state.result;
    else myOut=state.result==="win"?"lose":"win";
  }
  // Sounds
  const sk=`${state.version}_${state.phase}`;
  if(inR&&sk!==lastSK){
    lastSK=sk;
    if(state.isGameOver){if(myOut==="win"){sfxFanfare();confetti();}else if(myOut==="lose")sfxBoom();}
    else{if(myOut==="win"){sfxWin();confetti();}else if(myOut==="lose")sfxLose();else sfxDraw();}
  }
  let mt="",mc2="msg",bt="",bc="turn-badge";
  if(!inR){if(isMy){mt="Pick a stat!";bt="Your turn";bc="turn-badge turn-you";}else{mt="Waiting for opponent…";mc2="msg wait";bt="Opponent's turn";bc="turn-badge turn-them";}}
  else{
    if(myOut==="win"){mt="You win this round! 🎉";mc2="msg win";}
    else if(myOut==="lose"){mt="Opponent wins this round! 😔";mc2="msg lose";}
    else{mt="It's a draw!";mc2="msg draw";}
    bt=state.pickedBy===myRole?"Your pick":"Opponent's pick";
    bc="turn-badge "+(state.pickedBy===myRole?"turn-you":"turn-them");
  }
  // Controls
  const iAmWinner=myOut==="win"||myOut==="draw";
  let ctrlHTML="";
  if(inR){
    if(state.isGameOver){
      ctrlHTML=iAmWinner
        ?`<div class="end-banner won"><div style="font-size:32px;margin-bottom:0.25rem">🎉</div><div style="font-size:16px;font-weight:500;color:#5A9E22">You won the game!</div><div style="font-size:12px;color:var(--text2);margin:0.5rem 0 0.75rem">You collected all the cards</div><button onclick="showOnlineLobby()" style="margin-right:6px">Play again</button><button onclick="showMenu()">Menu</button></div>`
        :`<div class="end-banner lost"><div style="font-size:32px;margin-bottom:0.25rem">😔</div><div style="font-size:16px;font-weight:500;color:#E24B4A">Opponent wins!</div><div style="font-size:12px;color:var(--text2);margin:0.5rem 0 0.75rem">Better luck next time</div><button onclick="showOnlineLobby()" style="margin-right:6px">Play again</button><button onclick="showMenu()">Menu</button></div>`;
    } else {
      ctrlHTML=iAmWinner?`<button onclick="onlineNextCard()">Next card ↗</button>`:`<div class="msg wait" style="margin-top:0.5rem">⏳ Waiting for opponent to advance…</div>`;
    }
  }
  // Flip button (only during pick phase)
  const myFlipKey=myRole==="p1"?"p1Flipped":"p2Flipped";
  const myFlipLeft=myRole==="p1"?(state.p1Flips??2):(state.p2Flips??2);
  const myFlipOn=state[myFlipKey]||false;
  const flipBtn=!inR?`<button class="${myFlipOn?"flip-on":""}" onclick="onlineToggleFlip()">🔄 Flip ${myFlipOn?"ON ✓":"OFF"} (${myFlipLeft} left)</button>`:"";
  const p1f=state.p1Flipped||false, p2f=state.p2Flipped||false;
  const banner=inR?`<div class="flip-banner">${flipBannerText(p1f,p2f)}</div>`:"";
  // Opponent card
  const oppOut=myOut==="win"?"lose":myOut==="lose"?"win":myOut;
  // Build read-only settings info from state
  const flipsInfo  = `🔄 ${state.flipsAllowed??2} flip${(state.flipsAllowed??2)!==1?"s":""}`;
  const utInfo     = state.includeUTs ? "🏛️ UTs" : "";
  const proInfo    = state.proMode    ? "⚡ Pro" : "";
  const settingsBadges = [flipsInfo, utInfo, proInfo].filter(Boolean).join(" · ");

  app.innerHTML=`
    <div class="toolbar">
      <span class="pill active-online">🌐 Online</span>
      <span style="font-size:11px;color:var(--text3)">Room: <strong>${roomCode}</strong> · ${myRole==="p1"?"P1":"P2"}</span>
      <span style="flex:1"></span>
      <button class="small" onclick="leaveOnline()">Leave</button>
    </div>
    <!-- Read-only room settings strip — visible to both players, cannot be changed mid-game -->
    <div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:6px;padding:4px 0;background:var(--bg2);border-radius:var(--rs);border:0.5px solid var(--border)">
      ${settingsBadges}
    </div>
    <div class="score-bar">
      <div><div class="score-label">Your cards</div><div class="score-num">${myD.length}</div></div>
      <div style="font-size:11px;color:var(--text3)">${state.p1Deck.length+state.p2Deck.length} in play</div>
      <div style="text-align:right"><div class="score-label">Opponent</div><div class="score-num">${opD.length}</div></div>
    </div>
    <div class="turn-wrap"><span class="${bc}">${bt}</span></div>
    <div class="${mc2}">${mt}</div>
    <div class="arena">
      ${buildCard(mc,{hdrCls:"you",activeStat:sel,outcome:myOut,clickable:isMy&&!inR,animate:false})}
      ${inR?buildCard(oc,{hdrCls:"them",activeStat:sel,outcome:oppOut,clickable:false,animate:false}):faceDown("them","Opponent")}
    </div>
    <div class="controls">${ctrlHTML}${!inR?flipBtn:""}</div>
    ${banner}`;
}

// Boot
showMenu();
</script>
